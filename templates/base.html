<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contactos — Lab 11</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #161a22;
      --surface2: #1e2330;
      --border: #2a3040;
      --accent: #4f9eff;
      --accent2: #7c3aed;
      --danger: #ef4444;
      --success: #22c55e;
      --text: #e8eaf0;
      --muted: #6b7280;
      --radius: 12px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(79,158,255,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(124,58,237,0.06) 0%, transparent 60%);
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      background: rgba(13,15,20,0.85);
      backdrop-filter: blur(12px);
      z-index: 10;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: -0.02em;
    }

    .logo span {
      color: var(--accent);
    }

    .badge {
      font-size: 0.7rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 2px 10px;
      border-radius: 99px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    /* Flashes */
    .flash {
      padding: 0.75rem 1.25rem;
      border-radius: var(--radius);
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      animation: slideDown 0.3s ease;
    }
    .flash.success { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
    .flash.error   { background: rgba(239,68,68,0.12);  border: 1px solid rgba(239,68,68,0.3);  color: #fca5a5; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1.2rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: #3b8eef; transform: translateY(-1px); }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--border); }

    .btn-danger {
      background: rgba(239,68,68,0.1);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.25);
    }
    .btn-danger:hover { background: rgba(239,68,68,0.2); }

    .btn-sm { padding: 0.35rem 0.8rem; font-size: 0.8rem; }

    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
  <header>
    <div class="logo">📒 Agenda<span>Pro</span></div>
    <span class="badge">Lab 11 · AWS · Jfarfán</span>
  </header>

  <main>
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
        <div class="flash {{ cat }}">
          {{ '✅' if cat == 'success' else '⚠️' }} {{ msg }}
        </div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
